spring:
  application:
    name: analytics-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/chatplatform}
    username: ${SPRING_DATASOURCE_USERNAME:chatplatform}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: false

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672
    username: ${SPRING_RABBITMQ_USERNAME:chatplatform}
    password: ${SPRING_RABBITMQ_PASSWORD:changeme}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379
      password: ${SPRING_DATA_REDIS_PASSWORD:}

  # JWT decoder is configured in SecurityConfig using the shared secret

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-change-this-in-production-must-be-32-chars-minimum}

server:
  port: 8084

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus

logging:
  level:
    com.chatplatform: DEBUG
