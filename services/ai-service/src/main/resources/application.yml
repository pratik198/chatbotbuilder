spring:
  application:
    name: ai-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/chatplatform}
    username: ${SPRING_DATASOURCE_USERNAME:chatplatform}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
    hikari:
      maximum-pool-size: 5   # ai-service is mostly CPU-bound, fewer DB connections needed

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: false    # core-api owns all migrations

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 2000ms

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  metrics:
    tags:
      application: ${spring.application.name}

# ── Qdrant ────────────────────────────────────────────────────────
app:
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://ollama:11434}
    embedding-model: nomic-embed-text
  qdrant:
    host: ${QDRANT_HOST:localhost}
    port: ${QDRANT_PORT:6334}
    use-tls: false
  rag:
    top-k: 5
    score-threshold: 0.65

logging:
  level:
    com.chatplatform: DEBUG
