spring:
  application:
    name: kb-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/chatplatform}
    username: ${SPRING_DATASOURCE_USERNAME:chatplatform}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: false

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672
    username: ${SPRING_RABBITMQ_USERNAME:chatplatform}
    password: ${SPRING_RABBITMQ_PASSWORD:changeme}

  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      embedding:
        options:
          model: nomic-embed-text

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus

app:
  qdrant:
    host: ${QDRANT_HOST:localhost}
    port: ${QDRANT_PORT:6334}
    use-tls: false

  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:chatplatform}
    secret-key: ${MINIO_SECRET_KEY:changeme123}
    bucket: ${MINIO_BUCKET:chatplatform}

  kb:
    # How many characters per chunk (overlap = 10% of chunk size)
    chunk-size: 800
    chunk-overlap: 80
    # Qdrant vector dimension for nomic-embed-text
    vector-dimension: 768

logging:
  level:
    com.chatplatform: DEBUG
