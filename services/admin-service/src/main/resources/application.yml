spring:
  application:
    name: admin-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/chatplatform}
    username: ${SPRING_DATASOURCE_USERNAME:chatplatform}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: false    # core-api owns all migrations

  # JWT decoder configured in SecurityConfig using shared secret

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-change-this-in-production-must-be-32-chars-minimum}

server:
  port: 8085
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.chatplatform: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
