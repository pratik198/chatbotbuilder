apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: chatplatform
  labels:
    app: analytics-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
        - name: analytics-service
          image: ghcr.io/your-org/chatplatform/analytics-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8084
          envFrom:
            - configMapRef:
                name: chatplatform-config
          env:
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: chatplatform-secrets
                  key: POSTGRES_PASSWORD
            - name: SPRING_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: chatplatform-secrets
                  key: RABBITMQ_PASSWORD
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: chatplatform
spec:
  selector:
    app: analytics-service
  ports:
    - port: 8084
      targetPort: 8084
