# ================================================================
# Ingress — requires nginx-ingress-controller and cert-manager.
#
# Install:
#   helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
#   helm install ingress-nginx ingress-nginx/ingress-nginx
#
#   helm repo add jetstack https://charts.jetstack.io
#   helm install cert-manager jetstack/cert-manager --set installCRDs=true
#
# Replace app.yourdomain.com with your actual domain.
# ================================================================
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@yourdomain.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            class: nginx
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chatplatform-ingress
  namespace: chatplatform
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # WebSocket support
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    # Security headers
    nginx.ingress.kubernetes.io/server-snippet: |
      add_header X-Frame-Options DENY always;
      add_header X-Content-Type-Options nosniff always;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
spec:
  tls:
    - hosts:
        - app.yourdomain.com
      secretName: chatplatform-tls
  rules:
    - host: app.yourdomain.com
      http:
        paths:
          # WebSocket connections → chat-service
          - path: /ws/
            pathType: Prefix
            backend:
              service:
                name: chat-service
                port:
                  number: 8081

          # Public chat API → chat-service
          - path: /public/
            pathType: Prefix
            backend:
              service:
                name: chat-service
                port:
                  number: 8081

          # Conversations API → chat-service
          - path: /api/v1/conversations
            pathType: Prefix
            backend:
              service:
                name: chat-service
                port:
                  number: 8081

          # Analytics API → analytics-service
          - path: /api/v1/analytics
            pathType: Prefix
            backend:
              service:
                name: analytics-service
                port:
                  number: 8084

          # Admin API → admin-service
          - path: /admin/
            pathType: Prefix
            backend:
              service:
                name: admin-service
                port:
                  number: 8085

          # All other API → core-api
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: core-api
                port:
                  number: 8080

          # Frontend SPA
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
