# ================================================================
# Secrets — replace all <base64-encoded-value> placeholders
# before applying.
#
# Generate: echo -n 'your-value' | base64
#
# Apply: kubectl apply -f k8s/secrets.yaml -n chatplatform
# ================================================================
apiVersion: v1
kind: Secret
metadata:
  name: chatplatform-secrets
  namespace: chatplatform
type: Opaque
data:
  POSTGRES_PASSWORD: <base64-encoded-value>
  REDIS_PASSWORD: <base64-encoded-value>
  RABBITMQ_PASSWORD: <base64-encoded-value>
  MINIO_ROOT_USER: <base64-encoded-value>
  MINIO_ROOT_PASSWORD: <base64-encoded-value>
  JWT_SECRET: <base64-encoded-value>
  ENCRYPTION_KEY: <base64-encoded-value>
