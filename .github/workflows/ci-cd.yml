name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/chatplatform

jobs:

  # ── Backend Tests ─────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: chatplatform_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run tests for all services
        run: |
          for svc in core-api chat-service ai-service kb-service analytics-service; do
            echo "Testing $svc..."
            cd services/$svc
            mvn test \
              -Dspring.datasource.url=jdbc:postgresql://localhost:5432/chatplatform_test \
              -Dspring.datasource.username=test \
              -Dspring.datasource.password=test \
              -Dspring.data.redis.host=localhost \
              -Dspring.rabbitmq.host=localhost \
              --batch-mode --no-transfer-progress
            cd ../..
          done

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: services/*/target/surefire-reports/

  # ── Frontend Tests ────────────────────────────────────────────
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Type check
        run: cd frontend && npm run type-check

      - name: Run tests
        run: cd frontend && npm test -- --run

      - name: Build
        run: cd frontend && npm run build

  # ── Build & Push Docker Images ────────────────────────────────
  build-and-push:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [core-api, chat-service, ai-service, kb-service, analytics-service, admin-service, frontend]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set context path
        id: ctx
        run: |
          if [ "${{ matrix.service }}" = "frontend" ]; then
            echo "path=./frontend" >> $GITHUB_OUTPUT
          else
            echo "path=./services/${{ matrix.service }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.ctx.outputs.path }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to K3s ─────────────────────────────────────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Update image tags in manifests
        run: |
          for svc in core-api chat-service ai-service kb-service analytics-service admin-service; do
            sed -i "s|:latest|:${{ github.sha }}|g" k8s/$svc/deployment.yaml
          done
          sed -i "s|:latest|:${{ github.sha }}|g" k8s/frontend/deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/ --recursive -n chatplatform

      - name: Wait for rollouts
        run: |
          for svc in core-api chat-service ai-service kb-service analytics-service; do
            kubectl rollout status deployment/$svc -n chatplatform --timeout=300s
          done

      - name: Run database migrations
        run: |
          kubectl create job db-migrate-${{ github.sha }} \
            --from=cronjob/db-migrate \
            -n chatplatform || true
          kubectl wait job/db-migrate-${{ github.sha }} \
            --for=condition=complete \
            --timeout=120s \
            -n chatplatform
