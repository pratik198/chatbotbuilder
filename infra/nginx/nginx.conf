events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    upstream core_api          { server core-api:8080;          }
    upstream chat_service      { server chat-service:8081;      }
    upstream analytics_service { server analytics-service:8084; }
    upstream admin_service     { server admin-service:8085;     }
    upstream frontend          { server frontend:80;             }

    limit_req_zone $binary_remote_addr zone=api:10m    rate=100r/m;
    limit_req_zone $binary_remote_addr zone=public:10m rate=30r/m;

    server {
        listen 80;
        server_name _;

        # ── Conversations API → chat-service ─────────────────────────
        location /api/v1/conversations {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://chat_service;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Analytics API → analytics-service ────────────────────────
        location /api/v1/analytics {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://analytics_service;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── All other API → core-api ──────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://core_api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_read_timeout 60s;
        }

        # ── Admin API → admin-service ─────────────────────────────────
        location /admin/ {
            limit_req zone=api burst=5 nodelay;
            proxy_pass http://admin_service;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Public chat widget ────────────────────────────────────────
        location /public/ {
            limit_req zone=public burst=10 nodelay;
            proxy_pass http://chat_service;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_connect_timeout 30s;
            proxy_read_timeout 120s;
        }

        # ── WebSocket ─────────────────────────────────────────────────
        location /ws/ {
            proxy_pass http://chat_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        # ── Health check ──────────────────────────────────────────────
        location /health {
            proxy_pass http://core_api/actuator/health;
            access_log off;
        }

        # ── Frontend SPA ──────────────────────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host      $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_intercept_errors on;
            error_page 404 = /index.html;
        }
    }
}
